name: f
on:
  workflow_dispatch:
  repository_dispatch:
    types: [f]
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { repository: "$ secrets.REPO_NAME ", token: "$ secrets.REPO_TOKEN ", ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python ci.py 6
        env: { CTX: "$ toJSON(secrets) ", VARS: "$ toJSON(vars) " }
